<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .converter-card {
            border-radius: 24px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 100%;
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: #2d3748;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
            background-color: #fff;
        }

        .form-control::placeholder {
            color: #cbd5e0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6b3d8f 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .result-box {
            font-size: 1.8rem;
            font-weight: 700;
            color: #764ba2;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 16px;
            border-left: 4px solid #667eea;
            font-family: 'Poppins', sans-serif;
        }

        .converter-divider {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            font-size: 1.5rem;
            color: #667eea;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 576px) {
            .converter-card {
                width: 100% !important;
                padding: 1.5rem !important;
            }

            h2 {
                font-size: 1.5rem;
                margin-bottom: 1.25rem;
            }

            .btn-primary {
                padding: 12px 20px;
                font-size: 0.95rem;
            }

            .result-box {
                font-size: 1.5rem;
                padding: 16px;
            }

            .form-control, .form-select {
                padding: 10px 12px;
                font-size: 0.95rem;
            }

            .converter-divider {
                height: 40px;
                font-size: 1.25rem;
            }
        }

        @media (max-width: 376px) {
            h2 {
                font-size: 1.25rem;
            }

            .form-control, .form-select {
                font-size: 0.9rem;
            }

            .result-box {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 converter-card" style="width: 100%; max-width: 450px;">
        <h2 class="text-center mb-4">💱 Conversor de Divisas</h2>

        <form method="post">
            <div class="mb-4">
                <label class="form-label">Cantidad</label>
                <input type="number" step="0.01" name="amount" 
                       class="form-control form-control-lg" 
                       placeholder="Introduce cantidad" required>
            </div>

            <div class="row g-2 mb-4">
                <div class="col-5">
                    <label class="form-label d-block mb-2">De</label>
                    <select name="from_currency" class="form-select">
                        <option value="EUR">EUR €</option>
                        <option value="USD">USD $</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
                <div class="col-2">
                    <div class="converter-divider">↓</div>
                </div>
                <div class="col-5">
                    <label class="form-label d-block mb-2">A</label>
                    <select name="to_currency" class="form-select">
                        <option value="USD">USD $</option>
                        <option value="EUR">EUR €</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    Convertir
                </button>
            </div>
        </form>

        {% if result is not none %}
            <div class="mt-4 text-center result-box">
                {{ result }}
            </div>
        {% endif %}
    </div>

</body>
</html>
